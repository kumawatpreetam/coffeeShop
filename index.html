<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoasteryCoffee</title>
    <!-- FontAwesomeCDN  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- BootstrapCss  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CustomeCss  -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid p-0">
          <a class="navbar-brand me-0" href="#"
            ><img src="./assets/Logo.png" alt=""
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasDarkNavbar"
            aria-controls="offcanvasDarkNavbar"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="offcanvas offcanvas-end text-bg-dark"
            tabindex="-1"
            id="offcanvasDarkNavbar"
            aria-labelledby="offcanvasDarkNavbarLabel"
          >
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">
                Dark offcanvas
              </h5>
              <button
                type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"
              ></button>
            </div>
            <div class="offcanvas-body ul-main">
              <ul class="navbar-nav justify-content-start pe-3">
                <li class="nav-item ms-2">
                  <a class="nav-link" href="#">Equipments</a>
                </li>
                <li class="nav-item ms-2">
                  <a class="nav-link" href="#">Brew Guide</a>
                </li>
                <li class="nav-item ms-2">
                  <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item ms-2">
                  <a class="nav-link" href="#">Journal</a>
                </li>
                <li class="nav-item ms-2">
                  <a class="nav-link" href="#">Menu</a>
                </li>
              </ul>

              <div class="navbar-right-nav d-flex align-items-center">
                <span class="search-wrapper">
                  <span class="icon-box search-container"
                    ><i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input
                      type="text"
                      placeholder="Search for beans, gear..."
                      class="search-input"
                    />
                  </span>
                </span>
                <span class="icon-box"
                  ><i class="fa-solid fa-bag-shopping"></i
                ></span>
                <button class="login-btn">Login</button>
              </div>

              <!-- <form class="d-flex mt-3" role="search">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Search"
                  aria-label="Search"
                />
                <button class="btn btn-success" type="submit">Search</button>
              </form> -->
            </div>
          </div>
        </div>
      </nav>
    </header>
    <!-- BootstrapJs -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- CustomeJS  -->
    <script src="script.js"></script>
  </body>
</html>
